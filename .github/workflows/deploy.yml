name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main # Triggers the build every time you push to main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Targets the build folder inside your frontend directory
          path: 'frontend/dist/' # Change to 'frontend/build/' if using Create React App

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
